name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: backend/.python-version
      - name: Stage the README and LICENSE into the package
        run: python3 scripts/prepare_package.py
      - name: Stamp the build version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 scripts/release_version.py \
            --ref-type "$REF_TYPE" \
            --ref-name "$REF_NAME" \
            --run-number "$RUN_NUMBER"
      - name: Build the distribution
        run: uv build
      - name: Smoke test the wheel in a clean environment
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/sotellme --help
          /tmp/smoke/bin/python scripts/smoke_session.py
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: backend/dist/

  testpypi:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
